<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse City Random Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.js@3.2.5/dist/svg.min.js"></script>
    <link rel="stylesheet" href="mobile-viewer.css">
    <script src="mobile-viewer.js" defer></script>
</head>

<body>

    <main class="viewer-app">
        <div id="link-code-container"
            style="text-align: center; padding: 4px; font-weight: bold; font-size: 1.2rem; color: #333;">
            Mobile Link: <span id="link-code-value" style="color: #c0392b;">--- ---</span>
        </div>
        <nav id="level-tabs" class="level-tabs" aria-label="Level selector"></nav>
        <div id="status" class="status" hidden></div>

        <div id="map-active" class="map-slot" aria-label="Sa bàn"></div>

        <section class="random-panel" aria-live="polite">
            <div id="random-table" class="table-wrap"></div>
        </section>
    </main>
</body>

</html>
