<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse City Random Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.js@3.2.5/dist/svg.min.js"></script>
    <link rel="stylesheet" href="mobile-viewer.css">
    <script src="mobile-viewer.js" defer></script>
</head>

<body>
    <header class="viewer-header">
        <img src="image/syncitylogo.D2qIUmBC.png" alt="Synapse City" class="viewer-logo">
        <div class="viewer-title">Mobile</div>
    </header>

    <main class="viewer-shell">
        <div id="status" class="status" hidden></div>
        <div id="levels" class="levels" aria-live="polite"></div>
    </main>
</body>

</html>
